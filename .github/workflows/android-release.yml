name: Build Android

on:
  push:
    tags:
      - 'android/v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Gradle's preBuild runs `bun scripts/i18n/catalog.ts generate`.
      - uses: oven-sh/setup-bun@v2

      - name: install rust
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: meron-core

      # Uses the checked-in wrapper (mobile/gradlew, pinned to 9.4.1); the action
      # adds dependency caching.
      - uses: gradle/actions/setup-gradle@v4

      - uses: android-actions/setup-android@v3

      - name: install android ndk
        run: sdkmanager "ndk;27.3.13750724"

      - name: resolve version
        run: |
          set -euo pipefail
          # The committed build.gradle defaults are the source of truth for the
          # version; the release tag must match versionName.
          GRADLE=mobile/android/build.gradle
          VERSION_NAME=$(sed -nE 's/^[[:space:]]*def[[:space:]]+releaseVersionName[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' "$GRADLE")
          VERSION_CODE=$(sed -nE 's/^[[:space:]]*def[[:space:]]+releaseVersionCode[[:space:]]*=[[:space:]]*([0-9]+).*/\1/p' "$GRADLE")
          if [ -z "$VERSION_NAME" ] || [ -z "$VERSION_CODE" ]; then
            echo "::error::Could not read releaseVersionName/releaseVersionCode from $GRADLE."
            exit 1
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#android/v}"
            if [ "$TAG_VERSION" != "$VERSION_NAME" ]; then
              echo "::error::Tag $GITHUB_REF_NAME does not match build.gradle versionName $VERSION_NAME."
              exit 1
            fi
          fi
          echo "MERON_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "MERON_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "Building Meron Android $VERSION_NAME (code $VERSION_CODE)"

      - name: decode signing keystore
        env:
          APK_SIGNING_KEY: ${{ secrets.APK_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APK_SIGNING_KEY:-}" ]; then
            echo "::error::APK_SIGNING_KEY secret is not set — cannot produce a signed release APK."
            exit 1
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/meron-release.jks"
          printf '%s' "$APK_SIGNING_KEY" | base64 -d > "$KEYSTORE_PATH"
          echo "MERON_ANDROID_RELEASE_STORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: build rust core (release, stripped)
        env:
          PROFILE: release
          CARGO_TARGET_DIR: /tmp/meron-cargo-target
        run: |
          set -euo pipefail
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/27.3.13750724"
          cargo clean --manifest-path meron-core/Cargo.toml --target aarch64-linux-android --release
          cargo clean --manifest-path meron-core/Cargo.toml --target armv7-linux-androideabi --release
          mobile/scripts/package-rust-core-android.sh

      - name: build release apk
        env:
          MERON_ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.APK_KEY_STORE_PASSWORD }}
          MERON_ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.APK_KEY_ALIAS }}
          MERON_ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.APK_KEY_PASSWORD }}
        run: ./mobile/gradlew -p mobile :android:assembleRelease

      - name: rename apks
        run: |
          set -euo pipefail
          cd mobile/android/build/outputs/apk/release
          mv android-universal-release.apk "meron-${MERON_VERSION_NAME}.apk"
          mv android-arm64-v8a-release.apk "meron-${MERON_VERSION_NAME}-arm64-v8a.apk"
          mv android-armeabi-v7a-release.apk "meron-${MERON_VERSION_NAME}-armeabi-v7a.apk"

      - uses: softprops/action-gh-release@v2
        name: release
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: mobile/fastlane/metadata/android/en-US/changelogs/${{ env.MERON_VERSION_CODE }}.txt
          generate_release_notes: true
          files: mobile/android/build/outputs/apk/release/meron-*.apk
